<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
</head>
<body>

<h1>Edit Student</h1>

<form method="POST">

    {% csrf_token %}

    SID:
    <input type="text" name="sid" value="{{ student.sid }}"><br><br>

    Name:
    <input type="text" name="name" value="{{ student.name }}"><br><br>

    Qualification:
    <input type="text" name="qualification" value="{{ student.qualification }}"><br><br>

    Email:
    <input type="text" name="email" value="{{ student.email }}"><br><br>

    Phone:
    <input type="text" name="phno" value="{{ student.phno }}"><br><br>

    Trainer:
    <input type="text" name="trainer" value="{{ student.trainer }}"><br><br>

    Course:
    <input type="text" name="course" value="{{ student.course }}"><br><br>

    Status:
    <input type="text" name="status" value="{{ student.status }}"><br><br>

    Role:
    <input type="text" name="role" value="{{ student.role }}"><br><br>

    <button type="submit">
        Update
    </button>

</form>

</body>
</html>
