<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div class="login-card">

    <h1>Register</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/">
        Already have an account? Login
    </a>

</div>

</body>
</html>
